name: Mantarların Gizli Tarihi

on:
  schedule:
    - cron: "0 9 * * *"   # her gün 09:00 UTC = Türkiye 12:00
  workflow_dispatch:        # elle çalıştırma butonu

permissions:
  contents: write           # islenmis.txt'i geri commit edebilmek için

jobs:
  uret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ffmpeg kur
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Bağımlılıklar
        run: pip install -r requirements.txt

      - name: Video üret ve yükle
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          YT3_CLIENT_ID:     ${{ secrets.YT3_CLIENT_ID }}
          YT3_CLIENT_SECRET: ${{ secrets.YT3_CLIENT_SECRET }}
          YT3_REFRESH_TOKEN: ${{ secrets.YT3_REFRESH_TOKEN }}
        run: python uret.py

      - name: islenmis.txt kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add islenmis.txt
          git commit -m "islenen konu kaydedildi" || echo "degisiklik yok"
          git push
